###############################################################################
# Build d8 — Cloudflare workerd V8
#
# Matrix strategy: multiplos configs em paralelo.
# Suporta d8-standalone (GN) e workerd-full (Bazel).
###############################################################################
name: "Build d8 (Cloudflare workerd V8)"

on:
  workflow_dispatch:
    inputs:
      v8_version:
        description: "V8 version override. Vazio = auto-detect do workerd."
        required: false
        default: ""
        type: string
      configs:
        description: 'Configs JSON array (ex: ["fast"] ou ["fast","fuzz","tsan"])'
        required: true
        default: '["fast"]'
        type: string

      build_mode:
        description: "d8-standalone (GN, ~15min) ou workerd-full (Bazel, ~45min)"
        required: true
        default: "d8-standalone"
        type: choice
        options:
          - d8-standalone
          - workerd-full

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      v8_version: ${{ steps.version.outputs.V8_VERSION }}
      v8_branch: ${{ steps.version.outputs.V8_BRANCH }}
      matrix: ${{ steps.matrix.outputs.MATRIX }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect V8 version from workerd
        id: version
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.v8_version }}" ]; then
            V8_VER="${{ inputs.v8_version }}"
            echo "::notice::OVERRIDE: V8 ${V8_VER}"
          else
            V8_VER=$(curl -sf --max-time 15 \
              'https://raw.githubusercontent.com/cloudflare/workerd/main/build/deps/v8.MODULE.bazel' | \
              grep '^VERSION' | sed 's/VERSION = "//;s/"//')
            if [ -z "$V8_VER" ]; then
              echo "::error::FALHA ao detectar V8 do workerd!"
              echo "::error::SOLUCAO: use v8_version manualmente."
              exit 1
            fi
            echo "::notice::Cloudflare workerd V8: ${V8_VER}"
          fi
          V8_BRANCH="branch-heads/$(echo $V8_VER | cut -d. -f1,2)"
          echo "V8_VERSION=${V8_VER}" >> $GITHUB_OUTPUT
          echo "V8_BRANCH=${V8_BRANCH}" >> $GITHUB_OUTPUT

      - name: Build matrix
        id: matrix
        run: |
          set -euo pipefail
          pip3 -q install pyyaml

          python3 << 'PYEOF'
          import json, os, yaml

          configs = json.loads('${{ inputs.configs }}')

          with open('configs/v8-cf.yaml') as f:
              cfg = yaml.safe_load(f)
          available = set(cfg.get('configs', {}).keys())

          for c in configs:
              if c not in available:
                  print(f"::error::Config '{c}' NAO EXISTE! Disponiveis: {sorted(available)}")
                  raise SystemExit(1)

          include = [{"config": c} for c in configs]
          matrix = {"include": include}
          print(f"::notice::Matrix: {len(include)} jobs — {configs}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"MATRIX={json.dumps(matrix)}\n")
          PYEOF

  # d8-standalone builds (GN)
  build-d8:
    if: inputs.build_mode == 'd8-standalone'
    needs: prepare
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: "Phase 1: Pre-validate (${{ matrix.config }})"
        uses: ./.github/actions/pre-validate
        with:
          yaml_file: configs/v8-cf.yaml
          config: ${{ matrix.config }}

      - name: "Phase 2: Setup V8"
        uses: ./.github/actions/setup-v8
        with:
          v8_version: ${{ needs.prepare.outputs.v8_version }}
          v8_branch: ${{ needs.prepare.outputs.v8_branch }}
          config: ${{ matrix.config }}

      - name: "Phase 3: Build d8"
        id: build
        uses: ./.github/actions/build-d8
        with:
          config: ${{ matrix.config }}

      - name: "Phase 4: Post-validate"
        if: always() && !cancelled()
        uses: ./.github/actions/post-validate
        with:
          yaml_file: configs/v8-cf.yaml
          config: ${{ matrix.config }}
          v8_version: ${{ needs.prepare.outputs.v8_version }}
          build_result: ${{ steps.build.outcome }}

  # workerd-full builds (Bazel)
  build-workerd:
    if: inputs.build_mode == 'workerd-full'
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 240

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: "Build workerd (Bazel)"
        id: build
        uses: ./.github/actions/build-workerd
        with:
          build_target: "//src/workerd/server:workerd"
          run_tests: "false"

      - name: "Post-validate (workerd)"
        if: always() && !cancelled()
        shell: bash
        run: |
          WORKERD="${{ steps.build.outputs.workerd_path }}"
          if [ -z "$WORKERD" ] || [ ! -f "$WORKERD" ]; then
            echo "::error::Workerd binary NAO ENCONTRADO!"
            exit 1
          fi
          file "$WORKERD"
          du -sh "$WORKERD"
          "$WORKERD" --version 2>&1 || echo "::warning::--version nao suportado"

          pip3 -q install pyyaml
          python3 configs/verify-build.py update-status configs/v8-cf.yaml workerd-full \
            "${{ steps.build.outcome }}" \
            "${{ needs.prepare.outputs.v8_version }}" \
            "$(du -sh "$WORKERD" 2>/dev/null | cut -f1)"

          git config user.name "condor-data-bot"
          git config user.email "bot@condor-data.github.io"
          git add configs/v8-cf.yaml
          git commit -m "build-status: workerd-full = ${{ steps.build.outcome }}" || true
          git push || echo "::warning::Push failed"
