name: "Build d8 (Cloudflare workerd V8)"
on:
  workflow_dispatch:
    inputs:
      v8_version:
        description: "V8 version override. Vazio = auto-detect do workerd."
        required: false
        default: ""
        type: string
      v8_config:
        description: "Build config (do configs/v8-cf.yaml)"
        required: true
        default: "fast"
        type: choice
        options:
          - fast
          - fuzz
          - debug
          - release
          - asan
          - tsan
          - ubsan
          - workerd-full
          - workerd-asan
          - workerd-tsan
      build_mode:
        description: "d8-standalone (GN, ~15min) ou workerd-full (Bazel, ~45min, ~30GB disco)"
        required: true
        default: "d8-standalone"
        type: choice
        options:
          - d8-standalone
          - workerd-full

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: "[GATE] Workerd-full environment check"
        if: inputs.build_mode == 'workerd-full'
        run: |
          set -euo pipefail
          echo "=== Runner resources ==="
          df -h .
          free -h
          echo "CPUs: $(nproc)"

          AVAIL_KB=$(df . | tail -1 | awk '{print $4}')
          AVAIL_GB=$((AVAIL_KB / 1024 / 1024))
          RAM_GB=$(free -g | awk '/Mem:/{print $2}')

          echo ""
          echo "Disco: ${AVAIL_GB}GB | RAM: ${RAM_GB}GB"
          echo "Requer: ~30GB disco + ~12GB RAM para Bazel build completo"

          if [ "$AVAIL_GB" -lt 30 ]; then
            echo "::error::DISCO INSUFICIENTE para workerd-full: ${AVAIL_GB}GB (minimo 30GB)"
            exit 1
          fi
          if [ "$RAM_GB" -lt 10 ]; then
            echo "::error::RAM INSUFICIENTE para workerd-full: ${RAM_GB}GB (minimo 10GB)"
            exit 1
          fi

          echo "::notice::Runner OK para workerd-full (${AVAIL_GB}GB disco, ${RAM_GB}GB RAM)"

      - name: Detect V8 version from workerd
        id: version
        run: |
          set -euo pipefail
          if [ -n "${{ inputs.v8_version }}" ]; then
            V8_VER="${{ inputs.v8_version }}"
            echo "::notice::OVERRIDE: V8 ${V8_VER}"
          else
            V8_VER=$(curl -sf --max-time 15 \
              'https://raw.githubusercontent.com/cloudflare/workerd/main/build/deps/v8.MODULE.bazel' | \
              grep '^VERSION' | sed 's/VERSION = "//;s/"//') || \
              { echo "::error::FALHA ao detectar V8 do workerd!"; exit 1; }
            [ -z "$V8_VER" ] && { echo "::error::V8 version vazia!"; exit 1; }
            echo "::notice::Cloudflare workerd V8: ${V8_VER}"
          fi
          V8_BRANCH="branch-heads/$(echo $V8_VER | cut -d. -f1,2)"
          echo "V8_VERSION=${V8_VER}" >> $GITHUB_OUTPUT
          echo "V8_BRANCH=${V8_BRANCH}" >> $GITHUB_OUTPUT

      - name: "Phase 1: Pre-validate"
        if: inputs.build_mode == 'd8-standalone'
        uses: ./.github/actions/pre-validate
        with:
          yaml_file: configs/v8-cf.yaml
          config: ${{ inputs.v8_config }}

      # ========== d8-standalone PATH (GN) ==========
      - name: "Phase 2: Setup V8"
        if: inputs.build_mode == 'd8-standalone'
        uses: ./.github/actions/setup-v8
        with:
          v8_version: ${{ steps.version.outputs.V8_VERSION }}
          v8_branch: ${{ steps.version.outputs.V8_BRANCH }}
          config: ${{ inputs.v8_config }}

      - name: "Phase 3: Build d8"
        if: inputs.build_mode == 'd8-standalone'
        id: build-d8
        uses: ./.github/actions/build-d8
        with:
          config: ${{ inputs.v8_config }}

      - name: "Phase 4: Post-validate (d8)"
        if: always() && !cancelled() && inputs.build_mode == 'd8-standalone'
        uses: ./.github/actions/post-validate
        with:
          yaml_file: configs/v8-cf.yaml
          config: ${{ inputs.v8_config }}
          v8_version: ${{ steps.version.outputs.V8_VERSION }}
          build_result: ${{ steps.build-d8.outcome }}

      # ========== workerd-full PATH (Bazel) ==========
      - name: "Phase 2-3: Build workerd (Bazel)"
        if: inputs.build_mode == 'workerd-full'
        id: build-workerd
        uses: ./.github/actions/build-workerd
        with:
          build_target: "//src/workerd/server:workerd"
          extra_bazel_args: ""
          run_tests: "false"

      - name: "Phase 4: Post-validate (workerd)"
        if: always() && !cancelled() && inputs.build_mode == 'workerd-full'
        shell: bash
        run: |
          echo "::group::Post-validate workerd"
          WORKERD="${{ steps.build-workerd.outputs.workerd_path }}"

          if [ -z "$WORKERD" ] || [ ! -f "$WORKERD" ]; then
            echo "::error::Workerd binary NAO ENCONTRADO!"
            echo "::error::Build pode ter falhado. Verifique Phase 2-3."
            exit 1
          fi

          echo "=== Workerd binary ==="
          file "$WORKERD"
          du -sh "$WORKERD"

          echo "=== Workerd version ==="
          "$WORKERD" --version 2>&1 || echo "::warning::--version nao suportado"

          echo "=== Workerd basic test ==="
          timeout 5 "$WORKERD" --help 2>&1 | head -20 || echo "::warning::--help falhou ou timeout"

          echo "::endgroup::"

          # Update YAML status
          pip3 install pyyaml 2>/dev/null
          python3 configs/verify-build.py update-status configs/v8-cf.yaml workerd-full \
            "${{ steps.build-workerd.outcome }}" \
            "${{ steps.version.outputs.V8_VERSION }}" \
            "$(du -sh "$WORKERD" 2>/dev/null | cut -f1 || echo unknown)"

          git config user.name "condor-data-bot"
          git config user.email "bot@condor-data.github.io"
          git add configs/v8-cf.yaml
          git commit -m "build-status: workerd-full = ${{ steps.build-workerd.outcome }}" || true
          git push || echo "::warning::Push failed"
          v8_version: ${{ steps.version.outputs.V8_VERSION }}
          build_result: ${{ steps.build.outcome }}
