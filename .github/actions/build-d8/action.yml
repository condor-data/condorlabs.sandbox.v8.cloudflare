name: "Build d8"
description: "Gera args.gn + compila d8 com gn gen + autoninja"

inputs:
  config:
    description: "Build config name"
    required: true
  yaml_file:
    description: "Path do YAML config (ex: configs/v8-chrome.yaml)"
    required: true

outputs:
  d8_path:
    description: "Path do binario d8 compilado"
    value: ${{ steps.build.outputs.D8_PATH }}
  build_dir:
    description: "Path do build directory"
    value: ${{ steps.build.outputs.BUILD_DIR }}

runs:
  using: "composite"
  steps:
    - name: "[BUILD] Resources before build"
      shell: bash
      run: |
        echo "::group::Resources (pre-build)"
        echo "=== Memory ==="
        free -h
        echo "=== Disk ==="
        df -h .
        echo "=== CPUs ==="
        nproc
        echo "::endgroup::"

    - name: "[BUILD] Generate args.gn + gn gen + autoninja"
      id: build
      shell: bash
      run: |
        set -euo pipefail
        CONFIG="${{ inputs.config }}"
        BUILD_DIR="v8-build/v8/out/d8-${CONFIG}"
        D8_PATH="${BUILD_DIR}/d8"

        echo "D8_PATH=${D8_PATH}" >> $GITHUB_OUTPUT
        echo "BUILD_DIR=${BUILD_DIR}" >> $GITHUB_OUTPUT

        # ========================================
        # GERAR args.gn AQUI — DEPOIS do setup-v8
        # (pre-validate cria args.gn mas setup-v8
        #  faz rm -rf v8 em clone fresh, destruindo)
        # ========================================
        echo "::group::Generate args.gn (inside build step)"
        mkdir -p "$BUILD_DIR"
        python3 configs/yaml2gn.py ${{ inputs.yaml_file }} "$CONFIG" > "$BUILD_DIR/args.gn" || {
          echo "::endgroup::"
          echo "::error::yaml2gn.py FALHOU para config '${CONFIG}'!"
          exit 1
        }
        echo "args.gn content:"
        cat "$BUILD_DIR/args.gn"
        echo "::endgroup::"

        echo "::group::gn gen"
        cd v8-build/v8
        gn gen "out/d8-${CONFIG}" || {
          echo "::endgroup::"
          echo "::error::gn gen FALHOU!"
          exit 1
        }
        echo "::endgroup::"

        echo "::group::GN args RESOLVED (diagnostico)"
        echo "=== Critical flags resolved by GN ==="
        gn args "out/d8-${CONFIG}" --list --short 2>&1 | grep -E "memory_corruption|enable_sandbox|use_safe_libcxx|use_custom_libcxx" || true
        echo ""
        echo "=== V8_ENABLE_MEMORY_CORRUPTION_API in ninja files ==="
        grep -r "V8_ENABLE_MEMORY_CORRUPTION_API" "out/d8-${CONFIG}/" --include="*.ninja" 2>/dev/null | head -3 || echo "NOT FOUND in any .ninja file!"
        echo "::endgroup::"

        echo "::group::autoninja (d8-${CONFIG})"
        autoninja -C "out/d8-${CONFIG}" d8 || {
          echo "::endgroup::"
          echo "::error::BUILD FALHOU! Retrying com -j 2..."
          echo "::group::autoninja retry (-j 2)"
          autoninja -j 2 -C "out/d8-${CONFIG}" d8 || {
            echo "::endgroup::"
            echo "::error::BUILD FALHOU mesmo com -j 2!"
            exit 1
          }
          echo "::endgroup::"
        }
        echo "::endgroup::"

        echo "::group::Build stats"
        echo "d8 binary: $(du -sh "out/d8-${CONFIG}/d8" | cut -f1)"
        ccache -s
        echo "::endgroup::"

        echo "::group::Binary verification (nm)"
        echo "=== Flag symbol type (r=readonly, b/d=writable) ==="
        nm "out/d8-${CONFIG}/libv8.so" 2>/dev/null | grep "FLAGDEFAULT_expose_memory_corruption_api" || echo "Symbol not found in libv8.so!"
        echo "::endgroup::"

    - name: "[BUILD] Resources after build"
      if: always()
      shell: bash
      run: |
        echo "::group::Resources (post-build)"
        echo "=== Memory ==="
        free -h
        echo "=== Disk ==="
        df -h .
        echo "=== Swap usage ==="
        swapon --show
        echo "::endgroup::"
