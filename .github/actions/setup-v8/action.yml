name: "Setup V8 build environment"
description: "Instala deps, configura caches, faz fetch V8, habilita core dumps"

inputs:
  v8_version:
    description: "V8 version tag (ex: 14.7.173.18)"
    required: true
  v8_branch:
    description: "V8 branch (ex: branch-heads/14.7)"
    required: true
  config:
    description: "Build config name"
    required: true

runs:
  using: "composite"
  steps:
    - name: Free disk space
      shell: bash
      run: |
        echo "::group::Free disk space"
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost
        sudo rm -rf /usr/local/graalvm /usr/local/lib/node_modules /usr/local/.ghcup
        sudo apt-get autoremove -y 2>/dev/null || true
        sudo apt-get clean 2>/dev/null || true
        docker system prune -af 2>/dev/null || true
        echo "Disk after cleanup:"
        df -h .
        echo "::endgroup::"

    - name: Add swap space
      shell: bash
      run: |
        # Verificar swap existente antes de criar
        CURRENT_SWAP=$(free -g | awk '/Swap:/{print $2}')
        echo "Swap atual: ${CURRENT_SWAP}GB"

        if [ "$CURRENT_SWAP" -ge 8 ]; then
          echo "Swap suficiente (${CURRENT_SWAP}GB >= 8GB). Nada a fazer."
        else
          # Criar swap ADICIONAL em path diferente
          SWAPFILE="/mnt/extra-swap"
          NEED=$((8 - CURRENT_SWAP))
          echo "Adicionando ${NEED}GB de swap em ${SWAPFILE}..."
          sudo fallocate -l ${NEED}G "$SWAPFILE" || {
            echo "::error::fallocate FALHOU para ${SWAPFILE}!"
            echo "::error::Swap atual: ${CURRENT_SWAP}GB. Build pode ter OOM no linker."
            exit 1
          }
          sudo chmod 600 "$SWAPFILE"
          sudo mkswap "$SWAPFILE"
          sudo swapon "$SWAPFILE"
          echo "Swap adicional: ${NEED}GB"
        fi

        sudo sysctl vm.swappiness=10
        free -h

    - name: Check runner resources
      shell: bash
      run: |
        echo "::group::Runner resources"
        df -h .
        free -h
        echo "CPUs: $(nproc)"
        AVAIL_KB=$(df . | tail -1 | awk '{print $4}')
        AVAIL_GB=$((AVAIL_KB / 1024 / 1024))
        if [ "$AVAIL_GB" -lt 5 ]; then
          echo "::endgroup::"
          echo "::error::DISCO INSUFICIENTE: ${AVAIL_GB}GB (minimo 5GB)"
          exit 1
        fi
        echo "Disco disponivel: ${AVAIL_GB}GB"
        echo "::endgroup::"

    - name: Enable core dumps
      shell: bash
      run: |
        ulimit -c unlimited
        sudo mkdir -p /tmp/coredumps
        echo '/tmp/coredumps/core.%e.%p.%t' | sudo tee /proc/sys/kernel/core_pattern
        sudo systemctl disable apport 2>/dev/null || true
        sudo systemctl stop apport 2>/dev/null || true

    - name: Install build dependencies
      shell: bash
      run: |
        echo "::group::Install deps"
        sudo apt-get update -qq
        sudo apt-get install -y -qq ccache ninja-build python3 lsb-release pkg-config
        ccache --max-size=8G
        ccache --zero-stats
        export NINJA_SUMMARIZE_BUILD=1
        echo "NINJA_SUMMARIZE_BUILD=1" >> $GITHUB_ENV
        echo "::endgroup::"

    - name: Cache depot_tools
      uses: actions/cache@v5
      with:
        path: depot_tools
        key: depot-tools-v3-bootstrapped

    - name: Setup depot_tools
      shell: bash
      run: |
        if [ ! -d depot_tools ] || [ ! -f depot_tools/gclient ]; then
          rm -rf depot_tools
          git clone --depth 1 https://chromium.googlesource.com/chromium/tools/depot_tools.git || {
            echo "::error::FALHA ao clonar depot_tools!"
            exit 1
          }
        fi

        # Adicionar ao PATH do step ATUAL e dos seguintes
        export PATH="$PWD/depot_tools:$PATH"
        echo "$PWD/depot_tools" >> $GITHUB_PATH

        # VPYTHON_BYPASS: evitar vpython3 que precisa de CIPD
        export VPYTHON_BYPASS="manually managed python not supported by chrome operations"
        echo "VPYTHON_BYPASS=manually managed python not supported by chrome operations" >> $GITHUB_ENV

        # Forçar python3_bin_reldir.txt para o Python do sistema
        # O update_depot_tools tenta baixar Python via CIPD e pode falhar
        # Melhor garantir que aponta para o python3 do runner
        SYSTEM_PYTHON3=$(which python3)
        SYSTEM_PYTHON3_DIR=$(dirname "$SYSTEM_PYTHON3")
        echo "$SYSTEM_PYTHON3_DIR" > depot_tools/python3_bin_reldir.txt
        echo "python3_bin_reldir.txt -> $SYSTEM_PYTHON3_DIR (sistema)"

        # Verificar que gn funciona
        depot_tools/gn --version || {
          echo "::error::!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
          echo "::error::gn NAO FUNCIONA!"
          echo "::error::python3_bin_reldir.txt: $(cat depot_tools/python3_bin_reldir.txt 2>&1)"
          echo "::error::which python3: $(which python3 2>&1)"
          echo "::error::python3 --version: $(python3 --version 2>&1)"
          echo "::error::ls depot_tools/gn: $(ls -la depot_tools/gn 2>&1)"
          echo "::error::!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
          exit 1
        }
        echo "depot_tools OK: gn $(depot_tools/gn --version)"

    - name: Cache ccache
      uses: actions/cache@v5
      with:
        path: ~/.ccache
        key: ccache-${{ inputs.config }}-${{ inputs.v8_version }}
        restore-keys: |
          ccache-${{ inputs.config }}-
          ccache-

    - name: Cache V8 source tree
      uses: actions/cache@v5
      with:
        path: v8-build
        key: v8-source-${{ inputs.v8_version }}
        restore-keys: v8-source-

    - name: Fetch V8 ${{ inputs.v8_version }}
      shell: bash
      run: |
        echo "::group::Fetch V8 ${{ inputs.v8_version }}"
        set -euo pipefail
        V8_VERSION="${{ inputs.v8_version }}"

        # IMPORTANTE: V8 source DEVE ficar separado do checkout do repo (fork).
        # Usar v8-build/ na raiz do workspace, NÃO dentro do checkout do fork.
        mkdir -p v8-build
        cd v8-build

        if [ -d v8/.git ]; then
          echo "V8 source ja existe (cache hit). Atualizando para ${V8_VERSION}..."
          cd v8
          # Garantir que origin aponta para googlesource (não para fork)
          git remote set-url origin https://chromium.googlesource.com/v8/v8.git
          git fetch --tags origin 2>&1 || { echo "::error::git fetch falhou!"; exit 1; }
          git checkout "${V8_VERSION}" 2>/dev/null || \
            git checkout "tags/${V8_VERSION}" 2>/dev/null || {
            echo "::error::Tag ${V8_VERSION} nao encontrada!"
            exit 1
          }
          cd ..
        else
          # Limpar diretorio parcial (pode existir sem .git de cache corrompido)
          rm -rf v8
          echo "Clonando V8 do googlesource (tag ${V8_VERSION})..."
          git clone --branch "${V8_VERSION}" --depth 1 \
            https://chromium.googlesource.com/v8/v8.git v8 2>&1 || {

            echo "::warning::Clone shallow com tag falhou. Clone completo..."
            git clone https://chromium.googlesource.com/v8/v8.git v8 || {
              echo "::error::git clone V8 FALHOU!"
              exit 1
            }
            cd v8
            git fetch --tags origin || { echo "::error::git fetch falhou!"; exit 1; }
            git checkout "${V8_VERSION}" 2>/dev/null || \
              git checkout "tags/${V8_VERSION}" 2>/dev/null || {
              echo "::error::TAG ${V8_VERSION} NAO ENCONTRADA!"
              exit 1
            }
            cd ..
          }
        fi

        # .gclient na raiz de v8-build/ (pai de v8/)
        cat > .gclient << GCLIENT
        solutions = [{
          "name": "v8",
          "url": "https://chromium.googlesource.com/v8/v8.git@${V8_VERSION}",
          "deps_file": "DEPS",
          "managed": False,
          "custom_deps": {},
        }]
        GCLIENT

        # Pre-flight: verificar se servicos Google estao acessiveis
        echo "Pre-flight: verificando servicos Google..."
        CIPD_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
          "https://chrome-infra-packages.appspot.com/client?platform=linux-amd64" 2>&1 || echo "000")
        GCS_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
          "https://commondatastorage.googleapis.com/" 2>&1 || echo "000")

        if [ "$CIPD_STATUS" != "200" ] || [ "$GCS_STATUS" != "200" ] && [ "$GCS_STATUS" != "400" ]; then
          echo "::error::!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
          echo "::error::SERVICOS GOOGLE INACESSIVEIS!"
          echo "::error::"
          echo "::error::CIPD (chrome-infra-packages.appspot.com): HTTP ${CIPD_STATUS}"
          echo "::error::GCS (commondatastorage.googleapis.com): HTTP ${GCS_STATUS}"
          echo "::error::"
          echo "::error::gclient sync PRECISA destes servicos para baixar:"
          echo "::error::  - clang (compilador C++)"
          echo "::error::  - build tools (gn, ninja wrappers)"
          echo "::error::  - test262, ICU, e outras dependencias"
          echo "::error::"
          echo "::error::POSSIVEIS CAUSAS:"
          echo "::error::  1. Google App Engine outage (verificar https://status.cloud.google.com)"
          echo "::error::  2. Rate limiting por IP do GitHub Actions runner"
          echo "::error::  3. Bloqueio geografico"
          echo "::error::"
          echo "::error::SOLUCOES:"
          echo "::error::  - Esperar e re-disparar o build"
          echo "::error::  - Verificar status em https://status.cloud.google.com"
          echo "::error::  - Se persistir: investigar se GitHub Actions IPs estao bloqueados"
          echo "::error::!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
          exit 1
        fi
        echo "CIPD: HTTP ${CIPD_STATUS} | GCS: HTTP ${GCS_STATUS} — OK"

        echo "gclient sync (deps do V8)..."
        gclient sync --no-history --shallow -D 2>&1 | tail -20 || {
          echo "::error::!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
          echo "::error::gclient sync FALHOU!"
          echo "::error::"
          echo "::error::Isso significa que dependencias do V8 nao foram baixadas."
          echo "::error::O build NAO vai funcionar sem elas."
          echo "::error::"
          echo "::error::Possiveis causas:"
          echo "::error::  - CIPD ou Google Storage retornaram erro durante download"
          echo "::error::  - .gclient mal configurado"
          echo "::error::  - Disco cheio (verificar com df -h)"
          echo "::error::"
          echo "::error::Disco atual:"
          df -h . 2>&1 | tail -1
          echo "::error::!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!!"
          exit 1
        }

        echo "V8 ${V8_VERSION} pronto em v8-build/v8/"
        echo "::endgroup::"
