name: "Post-validate build"
description: "Testa d8 contra YAML, faz introspection, upload artifacts, atualiza status"

inputs:
  yaml_file:
    description: "Path do YAML config"
    required: true
  config:
    description: "Build config name"
    required: true
  v8_version:
    description: "V8 version"
    required: true
  build_result:
    description: "Resultado do step de build (success/failure)"
    required: true

runs:
  using: "composite"
  steps:
    # Upload PRIMEIRO — garante que o artifact é salvo mesmo se validação falhar
    - name: "[POST] Upload d8 artifact"
      if: inputs.build_result == 'success'
      uses: actions/upload-artifact@v7
      with:
        name: d8-${{ inputs.config }}-${{ inputs.v8_version }}
        path: |
          v8-build/v8/out/d8-${{ inputs.config }}/d8
          v8-build/v8/out/d8-${{ inputs.config }}/*.so
          v8-build/v8/out/d8-${{ inputs.config }}/snapshot_blob.bin
          v8-build/v8/out/d8-${{ inputs.config }}/icudtl.dat
        retention-days: 90
        if-no-files-found: error
        compression-level: 6

    # Validação e introspect DEPOIS do upload (artifact já está salvo)
    - name: "[POST] Validate d8 against YAML config"
      if: inputs.build_result == 'success'
      shell: bash
      run: |
        echo "::group::Post-validate: ${{ inputs.config }}"
        set -euo pipefail
        CONFIG="${{ inputs.config }}"
        D8="./v8-build/v8/out/d8-${CONFIG}/d8"

        python3 configs/verify-build.py post ${{ inputs.yaml_file }} "$CONFIG" "$D8" || {
          echo "::endgroup::"
          echo "::error::POST-BUILD VALIDATION FAILED!"
          echo "::error::O artifact d8 JA FOI SALVO — baixe e investigue manualmente."
          exit 1
        }
        echo "::endgroup::"

    - name: "[POST] Introspect binary (gn desc + nm + runtime probe)"
      if: inputs.build_result == 'success'
      shell: bash
      run: |
        echo "::group::Introspect: ${{ inputs.config }}"
        CONFIG="${{ inputs.config }}"
        D8="./v8-build/v8/out/d8-${CONFIG}/d8"
        BUILD_DIR="v8-build/v8/out/d8-${CONFIG}"

        python3 configs/verify-build.py introspect ${{ inputs.yaml_file }} "$CONFIG" "$D8" "$BUILD_DIR" || {
          echo "::endgroup::"
          echo "::error::INTROSPECT FAILED — mas artifact ja salvo."
        }
        echo "::endgroup::"

    - name: "[POST] Upload introspection report"
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: introspect-${{ inputs.config }}-${{ inputs.v8_version }}
        path: configs/reference/introspect-*.json
        retention-days: 90
        if-no-files-found: ignore

    - name: "[POST] Upload core dumps"
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: coredumps-${{ inputs.config }}-${{ inputs.v8_version }}
        path: /tmp/coredumps/
        retention-days: 30
        if-no-files-found: ignore

    - name: "[POST] Update build status in YAML"
      if: always()
      shell: bash
      run: |
        CONFIG="${{ inputs.config }}"
        D8="./v8-build/v8/out/d8-${CONFIG}/d8"

        # Extrair version — se d8 não executa, GRITAR (não esconder com "unknown")
        if [ -x "$D8" ]; then
          VERSION=$($D8 -e "print(version())" 2>&1)
          if [ -z "$VERSION" ]; then
            echo "::error::d8 executou mas version() retornou vazio!"
            VERSION="ERROR:empty"
          fi
          SIZE=$(du -sh "$D8" | cut -f1)
        else
          echo "::error::d8 NAO EXISTE ou NAO EXECUTAVEL: $D8"
          VERSION="ERROR:no-binary"
          SIZE="ERROR:no-binary"
        fi

        if [ "${{ inputs.build_result }}" = "success" ]; then
          python3 configs/verify-build.py update-status ${{ inputs.yaml_file }} "$CONFIG" "OK" "$VERSION" "$SIZE"
        else
          python3 configs/verify-build.py update-status ${{ inputs.yaml_file }} "$CONFIG" "FAIL" "$VERSION" "$SIZE"
        fi

        git config user.name "condor-data-bot"
        git config user.email "bot@condor-data.github.io"
        git add ${{ inputs.yaml_file }} configs/reference/ || {
          echo "::error::git add FALHOU! Arquivos podem nao existir."
          echo "::error::Verificar: ls -la ${{ inputs.yaml_file }} configs/reference/"
          ls -la ${{ inputs.yaml_file }} configs/reference/ 2>&1
          # Nao abortar — o status update eh best-effort quando o build falhou
        }

        if git diff --cached --quiet; then
          echo "Nenhuma mudanca para commitar"
        else
          git diff --cached --stat
          git commit -m "build-status: ${CONFIG} = ${{ inputs.build_result }} (V8 ${VERSION})"

          # Em matrix paralelo, outros jobs podem ter pushado antes.
          # Pull + rebase antes de push. Se falhar, o status fica no artifact.
          for attempt in 1 2 3; do
            git pull --rebase origin main 2>&1 && git push origin main 2>&1 && break || {
              echo "::warning::Push tentativa $attempt falhou (concurrent push). Retrying..."
              sleep $((attempt * 2))
            }
          done
        fi

    - name: "[POST] Job summary"
      if: always()
      shell: bash
      run: |
        CONFIG="${{ inputs.config }}"
        D8="./v8-build/v8/out/d8-${CONFIG}/d8"
        if [ -x "$D8" ]; then
          VERSION=$($D8 -e "print(version())" 2>&1)
          SIZE=$(du -sh "$D8" | cut -f1)
        else
          VERSION="NO_BINARY"
          SIZE="NO_BINARY"
        fi

        cat >> $GITHUB_STEP_SUMMARY << EOF
        ## Build Result: \`${{ inputs.config }}\`

        | Field | Value |
        |-------|-------|
        | Config | \`${{ inputs.config }}\` |
        | V8 Version | \`${VERSION}\` |
        | Build | ${{ inputs.build_result }} |
        | Binary Size | \`${SIZE}\` |
        | YAML | \`${{ inputs.yaml_file }}\` |

        ### Pipeline
        - [x] Pre-validate (YAML + args.gn)
        - [$( [ "${{ inputs.build_result }}" = "success" ] && echo "x" || echo " " )] Build d8
        - [$( [ "${{ inputs.build_result }}" = "success" ] && echo "x" || echo " " )] Post-validate + introspect
        - [x] Status updated
        EOF
